services:
  postgres:
    image: postgres:16-alpine
    container_name: agricultura-db
    environment:
      POSTGRES_DB: agricultura
      POSTGRES_USER: agricultura
      POSTGRES_PASSWORD: agricultura123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agricultura"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agricultura-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agricultura
      SPRING_DATASOURCE_USERNAME: agricultura
      SPRING_DATASOURCE_PASSWORD: agricultura123
      APP_JWT_SECRET: cHJveWV0by1zcHJpbmctYWdyaWN1bHR1cmEtc2VjcmV0LWtleS0yMDI0LW11aXRvLXNlZ3VyYS1lLWxvbmdhLTEyMzQ1Njc4OTA=
      APP_JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
    container_name: agricultura-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: agricultura-network