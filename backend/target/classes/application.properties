# Configuração Principal do Spring Boot
spring.application.name=projeto-spring-backend

# Perfil Ativo
spring.profiles.active=dev

# DataSource
spring.datasource.url=jdbc:postgresql://postgres:5432/agricultura
spring.datasource.username=agricultura
spring.datasource.password=agricultura123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

# Server
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# CORS
app.cors.allowed-origins=http://localhost:3000

# JWT (chave em BASE64 para HMAC-SHA)
app.jwt.secret=cHJveWV0by1zcHJpbmctYWdyaWN1bHR1cmEtc2VjcmV0LWtleS0yMDI0LW11aXRvLXNlZ3VyYS1lLWxvbmdhLTEyMzQ1Njc4OTA=
app.jwt.expiration=86400000

# Logging
logging.level.com.agricultura=DEBUG
logging.level.org.springframework.security=DEBUG