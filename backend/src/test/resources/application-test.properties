# Profile de Testes
# Desabilita Flyway e usa H2 in-memory para testes

# DataSource - H2 in-memory
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Flyway - DESABILITADO nos testes
spring.flyway.enabled=false

# JWT (chave válida para testes)
app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci10ZXN0aW5nLXB1cnBvc2VzLW9ubHktMjAyNC1taW5pbXVtLTM=
app.jwt.expiration=86400000
app.jwt.issuer=agricultura-api

# CORS
app.cors.allowed-origins=http://localhost:3000

# Server
server.error.include-message=never
server.error.include-binding-errors=never
